<svg viewBox="0 0 320 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Illustration of a smiling anime-style doctor holding a blood drop">
  <defs>
    <radialGradient id="glow" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#FDEDEF"/>
      <stop offset="100%" stop-color="#FDEDEF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- soft backdrop halo -->
  <circle cx="160" cy="170" r="150" fill="url(#glow)"/>

  <!-- stethoscope tube behind body -->
  <path d="M110 210 C90 240 95 275 130 285 C150 290 150 270 132 265 C115 261 112 245 122 228"
        fill="none" stroke="#0E7C7B" stroke-width="7" stroke-linecap="round"/>
  <circle cx="132" cy="266" r="8" fill="#0E7C7B"/>

  <!-- coat body -->
  <path d="M95 235
           C95 210 120 195 160 195
           C200 195 225 210 225 235
           L235 360 L85 360 Z"
        fill="#FFFFFF" stroke="#DEE2E6" stroke-width="2"/>

  <!-- coat lapels -->
  <path d="M160 200 L140 240 L160 260 L180 240 Z" fill="#EAF6F5" stroke="#DEE2E6" stroke-width="1.5"/>

  <!-- red cross badge -->
  <rect x="180" y="255" width="26" height="26" rx="5" fill="#FFFFFF" stroke="#C81E3A" stroke-width="1.5"/>
  <rect x="190" y="260" width="6" height="16" fill="#C81E3A"/>
  <rect x="184" y="266" width="18" height="6" fill="#C81E3A"/>

  <!-- neck -->
  <rect x="145" y="175" width="30" height="30" rx="10" fill="#FFDBB4"/>

  <!-- head -->
  <circle cx="160" cy="130" r="68" fill="#FFDBB4"/>

  <!-- ears -->
  <circle cx="94" cy="132" r="10" fill="#FFDBB4"/>
  <circle cx="226" cy="132" r="10" fill="#FFDBB4"/>

  <!-- hair back -->
  <path d="M92 120 C88 70 122 40 160 40 C198 40 232 70 228 120
           C228 95 205 78 160 78 C115 78 92 95 92 120 Z" fill="#2B2F33"/>

  <!-- hair bangs -->
  <path d="M98 112 C104 86 128 70 160 70 C192 70 216 86 222 112
           C214 100 192 92 160 92 C128 92 106 100 98 112 Z" fill="#3A3F45"/>
  <path d="M118 78 C126 62 142 54 160 54 C178 54 194 62 202 78
           C190 70 176 66 160 66 C144 66 130 70 118 78 Z" fill="#3A3F45"/>

  <!-- side hair strands -->
  <path d="M92 118 C86 150 90 175 100 190 L112 185 C104 165 100 140 100 118 Z" fill="#2B2F33"/>
  <path d="M228 118 C234 150 230 175 220 190 L208 185 C216 165 220 140 220 118 Z" fill="#2B2F33"/>

  <!-- eyebrows -->
  <path d="M120 108 Q133 100 146 106" fill="none" stroke="#2B2F33" stroke-width="3" stroke-linecap="round"/>
  <path d="M174 106 Q187 100 200 108" fill="none" stroke="#2B2F33" stroke-width="3" stroke-linecap="round"/>

  <!-- eyes (anime style: large, glossy) -->
  <ellipse cx="134" cy="126" rx="13" ry="17" fill="#FFFFFF"/>
  <ellipse cx="186" cy="126" rx="13" ry="17" fill="#FFFFFF"/>
  <ellipse cx="136" cy="129" rx="8" ry="11" fill="#0E7C7B"/>
  <ellipse cx="188" cy="129" rx="8" ry="11" fill="#0E7C7B"/>
  <circle cx="132" cy="122" r="3" fill="#FFFFFF"/>
  <circle cx="184" cy="122" r="3" fill="#FFFFFF"/>
  <ellipse cx="138" cy="134" rx="3" ry="4" fill="#000000" opacity="0.55"/>
  <ellipse cx="190" cy="134" rx="3" ry="4" fill="#000000" opacity="0.55"/>

  <!-- blush -->
  <ellipse cx="112" cy="148" rx="9" ry="6" fill="#F4A0AE" opacity="0.55"/>
  <ellipse cx="208" cy="148" rx="9" ry="6" fill="#F4A0AE" opacity="0.55"/>

  <!-- nose + smile -->
  <path d="M158 138 Q160 143 156 145" fill="none" stroke="#E3AE82" stroke-width="2" stroke-linecap="round"/>
  <path d="M142 156 Q160 170 178 156" fill="none" stroke="#B3122A" stroke-width="3" stroke-linecap="round"/>

  <!-- head mirror / reflector (classic doctor touch) -->
  <circle cx="160" cy="66" r="9" fill="#0E7C7B"/>
  <circle cx="160" cy="66" r="4" fill="#EAF6F5"/>

  <!-- arm holding blood drop -->
  <path d="M225 250 C255 255 270 275 265 300 C262 315 245 318 240 305"
        fill="#FFFFFF" stroke="#DEE2E6" stroke-width="2"/>
  <circle cx="240" cy="303" r="12" fill="#FFDBB4"/>

  <!-- kawaii blood drop mascot in hand -->
  <g transform="translate(238 265)">
    <path d="M0 -22 C14 -6 20 8 12 20 C6 28 -6 28 -12 20 C-20 8 -14 -6 0 -22 Z"
          fill="#C81E3A" stroke="#9A1730" stroke-width="1.5"/>
    <ellipse cx="-4" cy="2" rx="3" ry="5" fill="#FFFFFF" opacity="0.7"/>
    <circle cx="-4" cy="10" r="2" fill="#171B1F"/>
    <circle cx="4" cy="10" r="2" fill="#171B1F"/>
    <path d="M-4 15 Q0 18 4 15" fill="none" stroke="#171B1F" stroke-width="1.3" stroke-linecap="round"/>
  </g>

  <!-- other arm -->
  <path d="M95 250 C70 258 58 278 65 298 C70 312 88 313 92 300"
        fill="#FFFFFF" stroke="#DEE2E6" stroke-width="2"/>
  <circle cx="76" cy="296" r="11" fill="#FFDBB4"/>
</svg>
